name: Build iOS IPA & Upload TestFlight

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 清理旧的工程文件
        run: |
          find . -name "*.xcodeproj" -exec rm -rf {} \; 2>/dev/null || true
          find . -name "*.xcworkspace" -exec rm -rf {} \; 2>/dev/null || true
          rm -rf ./build ./DerivedData 2>/dev/null || true

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision 2>/dev/null || true

      - name: 配置Swift Package并生成App入口
        run: |
          if [ ! -f "Package.swift" ]; then
            swift package init --type library --name Habitapp 2>/dev/null || true
          fi

          cat > Package.swift << EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Habitapp",
              platforms: [.iOS(.v15)],
              products: [
                  .executable(name: "Habitapp", targets: ["Habitapp"])
              ],
              dependencies: [],
              targets: [
                  .executableTarget(
                      name: "Habitapp",
                      path: "Sources/Habitapp"
                  )
              ]
          )
          EOF

          mkdir -p Sources/Habitapp
          cat > Sources/Habitapp/App.swift << EOF
          import SwiftUI

          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

          find . -name "*.swift" -not -path "./Sources/*" -exec cp {} Sources/Habitapp/ \; 2>/dev/null || true

          VERSION=$(git rev-list --count HEAD)
          cat > Sources/Habitapp/Info.plist << PLIST_EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.hupanfeng.habit-tracker</string>
              <key>CFBundleName</key>
              <string>极简习惯追踪</string>
              <key>CFBundleVersion</key>
              <string>$VERSION</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.$VERSION</string>
              <key>CFBundleExecutable</key>
              <string>Habitapp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          PLIST_EOF

      - name: 缓存Swift Package依赖
        uses: actions/cache@v3
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.swift') }}

      - name: 编译并生成App
        run: |
          xcodebuild build -scheme Habitapp -destination 'platform=iOS Simulator,id=dvtdevice-DVTiPhoneSimulatorPlaceholder-iphonesimulator:placeholder' -configuration Release -UsePackageSwiftBuildSystem=1 2>/dev/null || true

          BUILD_DIR=$(xcodebuild -showBuildSettings -scheme Habitapp | grep "BUILD_DIR" | cut -d= -f2 | xargs)
          APP_PATH="$BUILD_DIR/Release-iphonesimulator/Habitapp.app"
          if [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
          else
            APP_PATH=".build/arm64-apple-ios-simulator/release/Habitapp.app"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/ 2>/dev/null || true
          fi

          codesign --force --deep --sign "iPhone Distribution" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision Payload/Habitapp.app 2>/dev/null || true

      - name: 打包为IPA
        run: |
          zip -r Habitapp.ipa Payload 2>/dev/null || true
          mkdir -p IPA
          mv Habitapp.ipa IPA/ 2>/dev/null || true

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa

      # 新增：自动上传到 TestFlight
      - name: 上传到 TestFlight
        uses: apple-actions/upload-testflight-build@v2
        with:
          app-identifier: com.hupanfeng.habit-tracker
          ipa-path: ./IPA/Habitapp.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}