name: Build iOS IPA (Final Working Version)
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 清理旧产物
        run: |
          rm -rf Habitapp.xcodeproj Habitapp build IPA Payload 2>/dev/null || true

      - name: 导入签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 生成标准 iOS 真机工程
        run: |
          # 1. 创建目录结构
          mkdir -p Habitapp/Classes
          mkdir -p Habitapp/Resources
          mkdir -p Habitapp.xcodeproj

          # 2. 生成 Info.plist（固定 Bundle ID，避免变量解析问题）
          cat > Habitapp/Resources/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Habitapp</string>
              <key>CFBundleIdentifier</key>
              <string>com.yourteam.Habitapp</string> <!-- 替换为你的真实Bundle ID -->
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
          </dict>
          </plist>
          EOF

          # 3. 生成 App 入口代码（兼容 iOS 真机）
          cat > Habitapp/Classes/App.swift << 'EOF'
          import UIKit
          @main
          class HabitappApp: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let label = UILabel(frame: CGRect(x: 0, y: 0, width: 300, height: 50))
                  label.center = window!.center
                  label.text = "Habitapp Build Success!"
                  label.textAlignment = .center
                  window?.rootViewController = UIViewController()
                  window?.rootViewController?.view.addSubview(label)
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

          # 4. 生成仅支持真机的 project.pbxproj
          cat > Habitapp.xcodeproj/project.pbxproj << 'EOF'
          // !$*UTF8*$!
          {
              archiveVersion = 1;
              classes = {
              };
              objectVersion = 56;
              objects = {
                  /* PBXBuildFile */
                  1 /* App.swift in Sources */ = {isa = PBXBuildFile; fileRef = 2 /* App.swift */; };
                  3 /* Info.plist in Resources */ = {isa = PBXBuildFile; fileRef = 4 /* Info.plist */; };

                  /* PBXFileReference */
                  2 /* App.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = Classes/App.swift; sourceTree = SOURCE_ROOT; };
                  4 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Resources/Info.plist; sourceTree = SOURCE_ROOT; };
                  5 /* Habitapp.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; path = Habitapp.app; sourceTree = BUILT_PRODUCTS_DIR; };

                  /* PBXGroup */
                  7 /* Project */ = {
                      isa = PBXGroup;
                      children = (8 /* Habitapp */, 9 /* Products */);
                      sourceTree = "<group>";
                  };
                  8 /* Habitapp */ = {isa = PBXGroup; children = (10 /* Classes */, 11 /* Resources */); path = Habitapp; sourceTree = "<group>"; };
                  10 /* Classes */ = {isa = PBXGroup; children = (2 /* App.swift */); path = Classes; sourceTree = "<group>"; };
                  11 /* Resources */ = {isa = PBXGroup; children = (4 /* Info.plist */); path = Resources; sourceTree = "<group>"; };
                  9 /* Products */ = {isa = PBXGroup; children = (5 /* Habitapp.app */); name = Products; sourceTree = BUILT_PRODUCTS_DIR; };

                  /* PBXNativeTarget */
                  12 /* Habitapp */ = {
                      isa = PBXNativeTarget;
                      buildConfigurationList = 13 /* ConfigList */;
                      buildPhases = (14 /* Sources */, 6 /* Frameworks */, 15 /* Resources */);
                      name = Habitapp;
                      productReference = 5 /* Habitapp.app */;
                      productType = "com.apple.product-type.application";
                  };

                  /* PBXProject */
                  16 /* Project */ = {
                      isa = PBXProject;
                      attributes = {TargetAttributes = {12 = {CreatedOnToolsVersion = 16.0; ProvisioningStyle = Manual; }; }; };
                      buildConfigurationList = 17 /* ProjectConfigList */;
                      compatibilityVersion = "Xcode 15.0";
                      mainGroup = 7 /* Project */;
                      productRefGroup = 9 /* Products */;
                      targets = (12 /* Habitapp */);
                  };

                  /* PBXBuildPhases */
                  14 /* Sources */ = {isa = PBXSourcesBuildPhase; files = (1 /* App.swift in Sources */); };
                  6 /* Frameworks */ = {isa = PBXFrameworksBuildPhase; files = (); };
                  15 /* Resources */ = {isa = PBXResourcesBuildPhase; files = (3 /* Info.plist in Resources */); };

                  /* XCBuildConfiguration */
                  18 /* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          INFOPLIST_FILE = Habitapp/Resources/Info.plist;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          PRODUCT_BUNDLE_IDENTIFIER = com.yourteam.Habitapp; <!-- 替换为你的真实Bundle ID -->
                          PRODUCT_NAME = Habitapp;
                          SDKROOT = iphoneos;
                          SUPPORTED_PLATFORMS = iphoneos; <!-- 仅支持真机 -->
                          TARGETED_DEVICE_FAMILY = "1"; <!-- 仅iPhone -->
                          CODE_SIGN_IDENTITY = "iPhone Distribution";
                          CODE_SIGN_STYLE = Manual;
                      };
                      name = Debug;
                  };
                  19 /* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          INFOPLIST_FILE = Habitapp/Resources/Info.plist;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          PRODUCT_BUNDLE_IDENTIFIER = com.yourteam.Habitapp; <!-- 替换为你的真实Bundle ID -->
                          PRODUCT_NAME = Habitapp;
                          SDKROOT = iphoneos;
                          SUPPORTED_PLATFORMS = iphoneos; <!-- 仅支持真机 -->
                          TARGETED_DEVICE_FAMILY = "1";
                          CODE_SIGN_IDENTITY = "iPhone Distribution";
                          CODE_SIGN_STYLE = Manual;
                          VALID_ARCHS = arm64; <!-- 仅真机架构 -->
                      };
                      name = Release;
                  };
                  13 /* ConfigList */ = {isa = XCConfigurationList; buildConfigurations = (18, 19); defaultConfigurationName = Release; };
                  20 /* Debug */ = {isa = XCBuildConfiguration; buildSettings = {MARKETING_VERSION = 1.0; }; name = Debug; };
                  21 /* Release */ = {isa = XCBuildConfiguration; buildSettings = {MARKETING_VERSION = 1.0; }; name = Release; };
                  17 /* ProjectConfigList */ = {isa = XCConfigurationList; buildConfigurations = (20, 21); defaultConfigurationName = Release; };
              };
              rootObject = 16 /* Project */;
          }
          EOF

      - name: 编译归档（真机通用目标，核心修复）
        run: |
          # 正确提取 Team ID（适配证书输出的标准格式）
          TEAM_ID=$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -n1 | awk '{print $NF}' | cut -d"(" -f2 | cut -d")" -f1)
          if [ -z "$TEAM_ID" ]; then
              echo "❌ 未找到有效的 iPhone Distribution 证书"
              exit 1
          fi
          echo "✅ 提取到开发团队ID: $TEAM_ID"

          # 执行真机归档（不再使用模拟器目标）
          xcodebuild archive \
            -project Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            PROVISIONING_PROFILE_SPECIFIER=Habitapp \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            -verbose

      - name: 导出 IPA（适配真机签名）
        run: |
          TEAM_ID=$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -n1 | awk '{print $NF}' | cut -d"(" -f2 | cut -d")" -f1)
          
          # 生成适配 ad-hoc 分发的 ExportOptions
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yourteam.Habitapp</key> <!-- 替换为你的真实Bundle ID -->
                  <string>Habitapp</string>
              </dict>
              <key>signingCertificate</key>
              <string>iPhone Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

          # 导出 IPA
          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA \
            -verbose

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa