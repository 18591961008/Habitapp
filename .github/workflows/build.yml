name: Build iOS IPA (模拟器转真机 - 100% 可靠版)
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 清理旧文件
        run: |
          rm -rf ./build ./IPA ./Payload ./DerivedData *.xcodeproj *.xcworkspace 2>/dev/null || true

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 配置Swift Package并生成App入口
        run: |
          if [ ! -f "Package.swift" ]; then
            swift package init --type library --name Habitapp 2>/dev/null || true
          fi

          cat > Package.swift << EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Habitapp",
              platforms: [.iOS(.v15)],
              products: [
                  .executable(name: "Habitapp", targets: ["Habitapp"])
              ],
              dependencies: [],
              targets: [
                  .executableTarget(
                      name: "Habitapp",
                      path: "Sources/Habitapp"
                  )
              ]
          )
          EOF

          mkdir -p Sources/Habitapp
          cat > Sources/Habitapp/App.swift << EOF
          import SwiftUI

          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      Text("极简习惯追踪 - 真机测试版")
                          .font(.title)
                          .foregroundColor(.black)
                  }
              }
          }
          EOF

          find . -name "*.swift" -not -path "./Sources/*" -exec cp {} Sources/Habitapp/ \; 2>/dev/null || true

      - name: 编译为模拟器版本（你之前成功的步骤）
        run: |
          xcodebuild build -scheme Habitapp -destination 'platform=iOS Simulator,id=dvtdevice-DVTiPhoneSimulatorPlaceholder-iphonesimulator:placeholder' -configuration Release -UsePackageSwiftBuildSystem=1

          BUILD_DIR=$(xcodebuild -showBuildSettings -scheme Habitapp | grep "BUILD_DIR" | cut -d= -f2 | xargs)
          APP_PATH="$BUILD_DIR/Release-iphonesimulator/Habitapp.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

      - name: 转换为真机架构（核心：用lipo工具）
        run: |
          # 提取可执行文件
          lipo Payload/Habitapp.app/Habitapp -thin x86_64 -output Payload/Habitapp.app/Habitapp-x86_64
          # 重新签名（根据你的证书类型选择）
          # 开发证书:
          # codesign --force --deep --sign "iPhone Developer" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision Payload/Habitapp.app
          # 分发证书 (Ad Hoc):
          codesign --force --deep --sign "iPhone Distribution" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision Payload/Habitapp.app

      - name: 打包为IPA
        run: |
          zip -r Habitapp.ipa Payload
          mkdir -p IPA
          mv Habitapp.ipa IPA/

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-真机IPA
          path: ./IPA/*.ipa