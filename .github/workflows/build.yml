name: Build iOS IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      # 调整顺序：先安装xcodegen工具
      - name: 安装xcodegen工具
        run: |
          brew install xcodegen

      - name: 在云端创建完整的Xcode iOS项目
        run: |
          # 创建xcodegen配置文件
          cat > project.yml << EOF
          name: Habitapp
          options:
            deploymentTarget: "15.0"
          targets:
            Habitapp:
              type: application
              platform: iOS
              sources:
                - path: .
                  excludes:
                    - .github
                    - .git
                    - Tests
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.hupanfeng.habit-tracker
                DEVELOPMENT_TEAM: 6GMTCJDKPM
                CODE_SIGN_STYLE: Manual
          EOF

          # 生成Xcode项目
          xcodegen generate

      - name: 导入苹果签名证书
        env:
          P12_FILE: ${{ secrets.P12_FILE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Certificates
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          echo "$P12_FILE" | base64 --decode > ~/Library/MobileDevice/Certificates/Habitapp.p12
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

          security import ~/Library/MobileDevice/Certificates/Habitapp.p12 -k ~/Library/Keychains/login.keychain-db -P "$P12_PASSWORD" -T /usr/bin/codesign

      - name: 生成Xcode项目并编译归档
        run: |
          # 清理
          xcodebuild clean -project Habitapp.xcodeproj -scheme Habitapp -configuration Release
          
          # 归档
          xcodebuild archive -project Habitapp.xcodeproj -scheme Habitapp -configuration Release \
            -archivePath ./Habitapp.xcarchive \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Habitapp" \
            DEVELOPMENT_TEAM="6GMTCJDKPM"

      - name: 导出IPA
        run: |
          mkdir -p ./IPA
          xcodebuild -exportArchive -archivePath ./Habitapp.xcarchive \
            -exportPath ./IPA \
            -exportOptionsPlist <(cat << EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store</string>
                <key>signingStyle</key>
                <string>manual</string>
                <key>teamID</key>
                <string>6GMTCJDKPM</string>
                <key>provisioningProfiles</key>
                <dict>
                    <key>com.hupanfeng.habit-tracker</key>
                    <string>Habitapp</string>
                </dict>
            </dict>
            </plist>
            EOF
            )

      - name: 上传IPA作为产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa