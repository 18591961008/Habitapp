name: Build iOS IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 编译归档（使用仓库中已有的完整项目）
        run: |
          # 清理
          xcodebuild clean -project Habitapp.xcodeproj -scheme Habitapp -configuration Release
          # 归档
          xcodebuild archive -project Habitapp.xcodeproj -scheme Habitapp -configuration Release \
            -archivePath ./Habitapp.xcarchive \
            DEVELOPMENT_TEAM=6GMTCJDKPM \
            PROVISIONING_PROFILE_SPECIFIER=Habitapp \
            CODE_SIGN_IDENTITY="iPhone Distribution"

      - name: 导出IPA
        run: |
          mkdir -p ./IPA
          xcodebuild -exportArchive -archivePath ./Habitapp.xcarchive \
            -exportPath ./IPA \
            -exportOptionsPlist <(cat << EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store</string>
                <key>signingStyle</key>
                <string>manual</string>
                <key>teamID</key>
                <string>6GMTCJDKPM</string>
                <key>provisioningProfiles</key>
                <dict>
                    <key>com.hupanfeng.habit-tracker</key>
                    <string>Habitapp</string>
                </dict>
            </dict>
            </plist>
            EOF
            )

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa