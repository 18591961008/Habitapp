    mkdir -p Habitapp.xcodeproj/project.xcworkspace/xcshareddata
    cat > Habitapp.xcodeproj/project.xcworkspace/xcshareddata/Habitapp.xcworkspacedata << 'EOF'
    <?xml version="1.0" encoding="UTF-8"?>
    <Workspace
       version = "1.0">
       <FileRef
          location = "self:Habitapp.xcodeproj">
       </FileRef>
