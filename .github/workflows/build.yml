                          CODE_SIGN_STYLE = Manual;
                          COPY_PHASE_STRIP = NO;
                          DEBUG_INFORMATION_FORMAT = "dwarf-with-dsym";
                          ENABLE_NS_ASSERTIONS = NO;
                          ENABLE_STRICT_OBJC_MSGSEND = YES;
                          GCC_C_LANGUAGE_STANDARD = gnu11;
                          GCC_NO_COMMON_BLOCKS = YES;
                          GCC_WARN_64_TO_32_BIT_CONVERSION = YES;
                          GCC_WARN_ABOUT_RETURN_TYPE = YES;
                          GCC_WARN_UNDECLARED_SELECTOR = YES;
                          GCC_WARN_UNINITIALIZED_AUTOS = YES;
                          GCC_WARN_UNUSED_FUNCTION = YES;
                          GCC_WARN_UNUSED_VARIABLE = YES;
                          INFOPLIST_FILE = Habitapp/Resources/Info.plist;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          LD_RUNPATH_SEARCH_PATHS = (
                              "$(inherited)",
                              "@executable_path/Frameworks",
                          );
                          PRODUCT_BUNDLE_IDENTIFIER = "com.yourcompany.Habitapp";
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_COMPILATION_MODE = wholemodule;
                          SWIFT_OPTIMIZATION_LEVEL = "-O";
                          SWIFT_VERSION = 5.0;
                          TARGETED_DEVICE_FAMILY = "1,2";
                          VALID_ARCHS = "arm64";
                      };
                      name = Release;
                  };
                  8D0F1C312A2B3C4D00000001 /* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                          MARKETING_VERSION = 1.0;
                          PRODUCT_BUNDLE_IDENTIFIER = "com.yourcompany.Habitapp";
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          VERSIONING_SYSTEM = "apple-generic";
                      };
                      name = Debug;
                  };
                  8D0F1C322A2B3C4D00000001 /* Build configuration list for PBXNativeTarget "Habitapp" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          8D0F1C332A2B3C4D00000001 /* Debug */,
                          8D0F1C342A2B3C4D00000001 /* Release */,
                      );
                      defaultConfigurationIsVisible = 0;
                      defaultConfigurationName = Release;
                  };
                  8D0F1C302A2B3C4D00000001 /* Build configuration list for PBXProject "Habitapp" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          8D0F1C312A2B3C4D00000001 /* Debug */,
                          8D0F1C352A2B3C4D00000001 /* Release */,
                      );
                      defaultConfigurationIsVisible = 0;
                      defaultConfigurationName = Release;
                  };
                  8D0F1C352A2B3C4D00000001 /* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                          MARKETING_VERSION = 1.0;
                          PRODUCT_BUNDLE_IDENTIFIER = "com.yourcompany.Habitapp";
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          VERSIONING_SYSTEM = "apple-generic";
                      };
                      name = Release;
                  };
                  /* End XCBuildConfiguration section */
              };
              rootObject = 8D0F1C202A2B3C4D00000001 /* Project object */;
          }
          EOF

      - name: 编译并归档 (xcodebuild archive)
        run: |
          # 从证书中提取 Team ID
          export TEAM_ID=$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -n1 | awk '{print $2}')
          if [ -z "$TEAM_ID" ]; then
            echo "❌ 未找到有效的 Distribution 证书"
            exit 1
          fi

          # 执行归档
          xcodebuild archive \
            -project Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            PROVISIONING_PROFILE_SPECIFIER="Habitapp" \
            CODE_SIGN_STYLE=Manual

          if [ $? -ne 0 ]; then
            echo "❌ xcodebuild archive 失败"
            exit 1
          fi

      - name: 导出 IPA
        run: |
          # 生成 ExportOptions.plist
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -n1 | awk '{print $2}')</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yourcompany.Habitapp</key>
                  <string>Habitapp</string>
              </dict>
          </dict>
          </plist>
          EOF

          # 导出 IPA
          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA

          if [ ! -f ./IPA/Habitapp.ipa ]; then
            echo "❌ IPA 导出失败"
            exit 1
          fi

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa