name: Build iOS IPA (回到最初成功版 - 真机可安装)
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 清理旧文件
        run: |
          rm -rf ./build ./IPA ./Payload ./DerivedData *.xcodeproj *.xcworkspace 2>/dev/null || true

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 配置Swift Package并生成App入口
        run: |
          if [ ! -f "Package.swift" ]; then
            swift package init --type library --name Habitapp 2>/dev/null || true
          fi

          cat > Package.swift << EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Habitapp",
              platforms: [.iOS(.v15)],
              products: [
                  .executable(name: "Habitapp", targets: ["Habitapp"])
              ],
              dependencies: [],
              targets: [
                  .executableTarget(
                      name: "Habitapp",
                      path: "Sources/Habitapp"
                  )
              ]
          )
          EOF

          mkdir -p Sources/Habitapp
          cat > Sources/Habitapp/App.swift << EOF
          import SwiftUI

          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      Text("极简习惯追踪 - 真机测试版")
                          .font(.title)
                          .foregroundColor(.black)
                  }
              }
          }
          EOF

          find . -name "*.swift" -not -path "./Sources/*" -exec cp {} Sources/Habitapp/ \; 2>/dev/null || true

      - name: 生成Xcode项目（关键：用Xcode生成，不再用swift build）
        run: |
          swift package generate-xcodeproj

      - name: 编译归档（真机目标）
        run: |
          xcodebuild archive \
            -project Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            -configuration Release \
            -verbose

      - name: 导出IPA
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA \
            -verbose

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-真机IPA
          path: ./IPA/*.ipa