name: Build iOS IPA (真机可安装最终版)
on:
  push:
    branches: [master]
  workflow_dispatch: # 支持手动触发

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 清理旧文件
        run: |
          rm -rf ./build ./IPA ./Payload ./DerivedData *.xcodeproj *.xcworkspace 2>/dev/null || true

      - name: 导入签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件（自动识别UUID）
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # 提取描述文件UUID并按Xcode标准命名
          TEMP_PROFILE=$(mktemp).mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$TEMP_PROFILE"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i "$TEMP_PROFILE"))
          mv "$TEMP_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "✅ 描述文件安装完成，UUID: $PROFILE_UUID"

      - name: 创建标准Xcode iOS项目（核心修复）
        run: |
          # 1. 创建iOS App工程（官方推荐方式，稳定无兼容问题）
          xcodebuild -create-project -name Habitapp -platform iOS -language Swift -dir .
          
          # 2. 基础配置（固定值，无需修改）
          xcodeproj="Habitapp.xcodeproj"
          # 设置Bundle ID（和你的描述文件保持一致）
          xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=PRODUCT_BUNDLE_IDENTIFIER SETTING_VALUE=com.hupanfeng.habit-tracker
          # 设置开发团队ID
          xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=DEVELOPMENT_TEAM SETTING_VALUE=6GMTCJDKPM
          # 启用手动签名
          xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=CODE_SIGN_STYLE SETTING_VALUE=Manual

          # ====================== 关键选择（二选一）======================
          # 选项1：如果你用【开发证书+开发描述文件】（推荐，测试用）
          # 取消下面2行的注释，注释掉选项2的内容
          # xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=CODE_SIGN_IDENTITY SETTING_VALUE="iPhone Developer"
          # export_method="development"

          # 选项2：如果你用【分发证书+Ad Hoc描述文件】（分发用）
          # 取消下面2行的注释，注释掉选项1的内容
          xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=CODE_SIGN_IDENTITY SETTING_VALUE="iPhone Distribution"
          export_method="ad-hoc"
          # ==============================================================

      - name: 生成SwiftUI入口文件
        run: |
          # 创建App入口（替换默认的ViewController）
          mkdir -p Habitapp
          cat > Habitapp/HabitappApp.swift << EOF
          import SwiftUI

          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      Text("极简习惯追踪 - 真机可安装版")
                          .font(.title)
                          .foregroundColor(.black)
                          .padding()
                  }
              }
          }
          EOF

          # 替换项目文件引用
          rm -f Habitapp/ViewController.swift
          xcodebuild -project Habitapp.xcodeproj -target Habitapp add-file Habitapp/HabitappApp.swift

      - name: 编译归档（真机目标，非模拟器）
        run: |
          xcodebuild archive \
            -project Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            -configuration Release \
            -verbose

      - name: 导出真机IPA
        run: |
          # 生成导出配置（自动匹配上面选择的导出方式）
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>\$export_method</string>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          # 执行导出
          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA \
            -verbose

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-真机可安装IPA
          path: ./IPA/*.ipa