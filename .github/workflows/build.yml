name: Build iOS IPA (Automatic Signing)
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 清理旧产物
        run: |
          rm -rf Habitapp.xcodeproj Habitapp build IPA Payload 2>/dev/null || true

      - name: 安装 xcodegen
        run: |
          brew install xcodegen

      - name: 生成项目配置文件 (project.yml) - 启用自动签名
        run: |
          cat > project.yml << 'EOF'
          name: Habitapp
          options:
            minimumDeploymentTarget: 15.0
            developmentTeam: 6GMTCJDKPM
          targets:
            Habitapp:
              type: application
              platform: iOS
              sources:
                - Habitapp/Classes
              settings:
                INFOPLIST_FILE: Habitapp/Resources/Info.plist
                PRODUCT_BUNDLE_IDENTIFIER: com.hupanfeng.habit-tracker
                # 关键：启用自动签名
                CODE_SIGN_STYLE: Automatic
                DEVELOPMENT_TEAM: 6GMTCJDKPM
          EOF

      - name: 生成 Info.plist (自动递增版本号)
        run: |
          mkdir -p Habitapp/Resources
          VERSION=$(git rev-list --count HEAD)
          cat > Habitapp/Resources/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleVersion</key>
              <string>$VERSION</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.$VERSION</string>
              <key>CFBundleName</key>
              <string>极简习惯追踪</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
          </dict>
          </plist>
          EOF

      - name: 生成 App 入口文件 (SwiftUI兼容)
        run: |
          mkdir -p Habitapp/Classes
          cat > Habitapp/Classes/App.swift << 'EOF'
          import SwiftUI
          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      Text("极简习惯追踪 - 测试版")
                          .font(.title)
                          .foregroundColor(.black)
                  }
              }
          }
          EOF

      - name: 生成 Xcode 项目 (使用 xcodegen)
        run: |
          xcodegen generate

      - name: 导入签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 编译归档 (自动签名)
        run: |
          xcodebuild archive \
            -project Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            -configuration Release \
            -allowProvisioningUpdates \
            -verbose

      - name: 生成导出配置文件 (自动签名)
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>signingStyle</key>
              <string>automatic</key>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: 导出 IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA \
            -allowProvisioningUpdates \
            -verbose

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa