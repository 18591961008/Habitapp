name: Build iOS IPA (无工程版)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 配置基础环境
        run: |
          # 安装必要工具
          brew install ldid
          # 创建标准目录结构
          mkdir -p ./src ./build ./Payload/Habitapp.app

      - name: 导入签名证书和描述文件
        env:
          P12_FILE: ${{ secrets.P12_FILE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # 导入证书到钥匙串
          echo "$P12_FILE" | base64 --decode > ./cert.p12
          security import ./cert.p12 -k ~/Library/Keychains/login.keychain-db -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/ldid
          
          # 保存描述文件并提取权限
          echo "$PROVISIONING_PROFILE" | base64 --decode > ./profile.mobileprovision
          security cms -D -i ./profile.mobileprovision > ./profile.plist
          /usr/libexec/PlistBuddy -x -c 'Print:Entitlements' ./profile.plist > ./entitlements.plist

      - name: 编译Swift源码为静态库
        run: |
          # 收集所有Swift源码
          find . -name "*.swift" -exec mv {} ./src/ \;
          
          # 编译为ARM64静态库（iOS真机架构）
          swiftc -target arm64-apple-ios15.0 -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
            -emit-library -o ./build/libHabitapp.a ./src/*.swift \
            -parse-as-library -module-name Habitapp

      - name: 构建完整iOS App包
        run: |
          # 1. 创建App可执行文件（拼接启动入口）
          echo '#import <UIKit/UIKit.h>
          int main(int argc, char *argv[]) {
              @autoreleasepool {
                  return UIApplicationMain(argc, argv, nil, NSStringFromClass([UIApplication class]));
              }
          }' > ./src/main.m
          
          # 2. 编译启动入口+静态库为可执行文件
          clang -target arm64-apple-ios15.0 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            ./src/main.m ./build/libHabitapp.a -o ./Payload/Habitapp.app/Habitapp \
            -framework UIKit -framework Foundation -ObjC

          # 3. 创建Info.plist（App核心配置）
          cat > ./Payload/Habitapp.app/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.hupanfeng.habit-tracker</string>
              <key>CFBundleName</key>
              <string>Habitapp</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleExecutable</key>
              <string>Habitapp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF

          # 4. 签名App包（关键：适配所有签名规则）
          codesign --force --deep --sign "iPhone Distribution" \
            --entitlements ./entitlements.plist \
            --timestamp=none \
            ./Payload/Habitapp.app

      - name: 打包为IPA文件
        run: |
          # 压缩为标准IPA格式
          zip -r ./Habitapp.ipa ./Payload
          # 移动到IPA目录供上传
          mkdir -p ./IPA
          mv ./Habitapp.ipa ./IPA/

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa