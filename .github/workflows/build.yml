- name: 编译并生成App
  run: |
    # 设置签名信息
    export DEVELOPMENT_TEAM=$(security find-identity -v -p codesigning | grep "iPhone Distribution" | awk '{print $2}' | head -n1)
    if [ -z "$DEVELOPMENT_TEAM" ]; then
      echo "错误：未找到有效的iPhone Distribution证书"
      exit 1
    fi
    echo "找到开发团队ID: $DEVELOPMENT_TEAM"

    # 使用真机通用目标构建（适配签名）
    echo "开始构建..."
    xcodebuild build -scheme Habitapp \
      -destination 'generic/platform=iOS' \
      -configuration Release \
      -UsePackageSwiftBuildSystem=1 \
      CODE_SIGN_IDENTITY="iPhone Distribution" \
      DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
      CODE_SIGN_STYLE=Manual \
      PROVISIONING_PROFILE_SPECIFIER="Habitapp"

    if [ $? -ne 0 ]; then
      echo "错误：xcodebuild 构建失败"
      exit 1
    fi

    # 找到编译产物并复制到Payload目录（兼容不同Xcode版本的路径）
    BUILD_DIR=$(xcodebuild -showBuildSettings -scheme Habitapp | grep "BUILD_DIR" | cut -d= -f2 | xargs)
    APP_PATH="$BUILD_DIR/Release-iphoneos/Habitapp.app"
    echo "尝试查找编译产物: $APP_PATH"

    if [ -d "$APP_PATH" ]; then
      echo "找到编译产物: $APP_PATH"
      mkdir -p Payload
      cp -r "$APP_PATH" Payload/
    else
      # 备用路径：适配新版Xcode的编译产物位置
      APP_PATH=".build/arm64-apple-ios/release/Habitapp.app"
      echo "尝试备用路径: $APP_PATH"
      if [ -d "$APP_PATH" ]; then
        echo "找到编译产物: $APP_PATH"
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
      else
        echo "错误：未在任何路径下找到编译后的 .app 文件"
        exit 1
      fi
    fi

    # 重新签名（适配真机）
    if [ -d "Payload/Habitapp.app" ]; then
      echo "开始重新签名..."
      codesign --force --deep --sign "$DEVELOPMENT_TEAM" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision Payload/Habitapp.app
    fi