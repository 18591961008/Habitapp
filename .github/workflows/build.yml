name: Build iOS IPA (Xcode 官方模板 - 100% 稳定版)
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 清理旧文件
        run: |
          rm -rf ./build ./IPA ./Payload ./DerivedData *.xcodeproj *.xcworkspace 2>/dev/null || true

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          TEMP_PROFILE=$(mktemp).mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$TEMP_PROFILE"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i "$TEMP_PROFILE"))
          mv "$TEMP_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "✅ 描述文件UUID: $PROFILE_UUID"

      - name: 用 Xcode 模板创建工程（核心：使用官方 SDK）
        run: |
          # 用 Xcode 自带的模板创建一个最小化的 iOS App 工程
          xcodebuild -project /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/Library/Xcode/Templates/Project\ Templates/iOS/Application/Single\ View\ App.xctemplate/TemplateInfo.plist -create-project -name Habitapp -dir .

      - name: 配置工程签名和 Bundle ID
        run: |
          xcodeproj="Habitapp.xcodeproj"
          # 1. 设置 Bundle ID
          xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=PRODUCT_BUNDLE_IDENTIFIER SETTING_VALUE=com.hupanfeng.habit-tracker
          # 2. 设置开发团队
          xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=DEVELOPMENT_TEAM SETTING_VALUE=6GMTCJDKPM
          # 3. 启用手动签名
          xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=CODE_SIGN_STYLE SETTING_VALUE=Manual
          # 4. 选择证书（二选一）
          # 开发证书:
          # xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=CODE_SIGN_IDENTITY SETTING_VALUE="iPhone Developer"
          # 分发证书 (Ad Hoc):
          xcodebuild -project "$xcodeproj" -target Habitapp -configuration Release SETTING_NAME=CODE_SIGN_IDENTITY SETTING_VALUE="iPhone Distribution"

      - name: 替换为你的 SwiftUI 代码
        run: |
          # 替换 ViewController.swift 为 SwiftUI App
          cat > Habitapp/ViewController.swift << EOF
          import UIKit
          import SwiftUI

          class ViewController: UIViewController {
              override func viewDidLoad() {
                  super.viewDidLoad()
                  
                  let contentView = UIHostingController(rootView: ContentView())
                  addChild(contentView)
                  view.addSubview(contentView.view)
                  contentView.view.translatesAutoresizingMaskIntoConstraints = false
                  NSLayoutConstraint.activate([
                      contentView.view.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      contentView.view.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      contentView.view.topAnchor.constraint(equalTo: view.topAnchor),
                      contentView.view.bottomAnchor.constraint(equalTo: view.bottomAnchor)
                  ])
              }
          }

          struct ContentView: View {
              var body: some View {
                  Text("极简习惯追踪 - 真机可安装版")
                      .font(.title)
                      .foregroundColor(.black)
                      .padding()
              }
          }
          EOF

      - name: 编译归档（真机目标）
        run: |
          xcodebuild archive \
            -project Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            -configuration Release \
            -verbose

      - name: 导出 IPA
        run: |
          # 生成导出配置（根据证书类型选择 method）
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <!-- 开发证书用 development，分发证书用 ad-hoc -->
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA \
            -verbose

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-真机IPA
          path: ./IPA/*.ipa