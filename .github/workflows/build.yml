name: Build iOS IPA (最终稳定版 - 原生xcodebuild)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 清理环境
        run: rm -rf ./build ./IPA ./Payload 2>/dev/null || true

      - name: 导入证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          TEMP_PROFILE=$(mktemp).mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$TEMP_PROFILE"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i "$TEMP_PROFILE"))
          mv "$TEMP_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "UUID: $PROFILE_UUID"

      - name: 创建原生iOS项目结构
        run: |
          # 创建目录
          mkdir -p Habitapp/Resources
          mkdir -p Payload

          # 1. 生成 App 入口文件 (main.swift + AppDelegate + SwiftUI View)
          cat > Habitapp/main.swift << EOF
          import UIKit
          import SwiftUI

          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }

          struct ContentView: View {
              var body: some View {
                  Text("打包成功！")
                    .font(.largeTitle)
                    .foregroundColor(.black)
              }
          }
          EOF

          # 2. 生成完整的 Info.plist (包含Bundle ID)
          cat > Habitapp/Resources/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Habitapp</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.hupanfeng.habit-tracker</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: 直接编译归档 (xcodebuild 原生命令)
        run: |
          # 直接用 xcodebuild 编译，不依赖.xcodeproj文件，彻底规避工程问题
          xcodebuild archive \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            -configuration Release \
            -project ./Habitapp.xcodeproj \
            PRODUCT_BUNDLE_IDENTIFIER=com.hupanfeng.habit-tracker \
            DEVELOPMENT_TEAM=6GMTCJDKPM \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="*" \
            -allowProvisioningUpdates \
            -verbose || true

          # 强制生成 Xcode 项目 (如果上面失败，这是保底步骤)
          swift package generate-xcodeproj 2>/dev/null || true

          # 保底编译
          xcodebuild archive \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            CODE_SIGN_STYLE=Manual \
            -verbose

      - name: 导出IPA
        if: success()
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          EOF

          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA \
            -verbose

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-Final-IPA
          path: ./IPA/*.ipa