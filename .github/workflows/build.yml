name: Build iOS IPA (回到最初成功版 - 仅修复真机安装)
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 清理旧文件
        run: |
          rm -rf ./build ./IPA ./Payload ./DerivedData 2>/dev/null || true

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 配置Swift Package并生成App入口（和你之前完全一样）
        run: |
          if [ ! -f "Package.swift" ]; then
            swift package init --type library --name Habitapp 2>/dev/null || true
          fi

          cat > Package.swift << EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Habitapp",
              platforms: [.iOS(.v15)],
              products: [
                  .executable(name: "Habitapp", targets: ["Habitapp"])
              ],
              dependencies: [],
              targets: [
                  .executableTarget(
                      name: "Habitapp",
                      path: "Sources/Habitapp"
                  )
              ]
          )
          EOF

          mkdir -p Sources/Habitapp
          cat > Sources/Habitapp/App.swift << EOF
          import SwiftUI

          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      Text("极简习惯追踪 - 测试版")
                          .font(.title)
                          .foregroundColor(.black)
                  }
              }
          }
          EOF

          find . -name "*.swift" -not -path "./Sources/*" -exec cp {} Sources/Habitapp/ \; 2>/dev/null || true

      - name: 编译为模拟器版本（你之前成功的步骤，完全不变）
        run: |
          xcodebuild build -scheme Habitapp -destination 'platform=iOS Simulator,name=iPhone 17' -configuration Release -UsePackageSwiftBuildSystem=1

          BUILD_DIR=$(xcodebuild -showBuildSettings -scheme Habitapp | grep "BUILD_DIR" | cut -d= -f2 | xargs)
          APP_PATH="$BUILD_DIR/Release-iphonesimulator/Habitapp.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

      - name: 修复 Info.plist（解决 Bundle ID 缺失）
        run: |
          cat > Payload/Habitapp.app/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Habitapp</string>
              <key>CFBundleIdentifier</key>
              <string>com.hupanfeng.habit-tracker</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
          </dict>
          </plist>
          EOF

      - name: 重新签名（适配真机，核心修复）
        run: |
          # 提取描述文件UUID
          TEMP_PROFILE=$(mktemp).mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$TEMP_PROFILE"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i "$TEMP_PROFILE"))
          rm -f "$TEMP_PROFILE"

          # 选择你的证书类型（二选一）
          # 开发证书：
          # codesign --force --deep --sign "iPhone Developer" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision Payload/Habitapp.app
          # 分发证书（Ad Hoc）：
          codesign --force --deep --sign "iPhone Distribution" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision Payload/Habitapp.app

      - name: 打包为IPA
        run: |
          zip -r Habitapp.ipa Payload
          mkdir -p IPA
          mv Habitapp.ipa IPA/

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa