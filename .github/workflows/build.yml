            /* End PBXBuildFile section */

            /* Begin PBXFileReference section */
            8D0F1C282A2B3C4D00000001 /* Habitapp.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = Habitapp.app; sourceTree = BUILT_PRODUCTS_DIR; };
            8D0F1C292A2B3C4D00000001 /* AppDelegate.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = Classes/AppDelegate.swift; sourceTree = SOURCE_ROOT; };
            8D0F1C2D2A2B3C4D00000001 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Resources/Info.plist; sourceTree = SOURCE_ROOT; };
