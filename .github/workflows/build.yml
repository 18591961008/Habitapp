name: Build iOS IPA (Stable Xcode Project)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 清理旧文件
        run: |
          rm -rf ./build ./DerivedData ./Payload ./*.xcarchive 2>/dev/null || true

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 生成标准 Xcode 项目 (Habitapp.xcodeproj)
        run: |
          # 创建项目目录结构
          mkdir -p Habitapp/Resources
          mkdir -p Habitapp/Classes

          # 生成 Info.plist
          cat > Habitapp/Resources/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleSignature</key>
              <string>????</string>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
          </dict>
          </plist>
          EOF

          # 生成 App 入口文件
          cat > Habitapp/Classes/AppDelegate.swift << EOF
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = UIViewController()
                  vc.view.backgroundColor = .white
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

          # 生成 Xcode 项目文件
          cat > Habitapp.xcodeproj/project.pbxproj << EOF
          // !$*UTF8*$!
          {
              archiveVersion = 1;
              classes = {
              };
              objectVersion = 55;
              objects = {
                  /* Begin PBXBuildFile section */
                  8D0F1C2A2A2B3C4D00000001 /* AppDelegate.swift in Sources */ = {isa = PBXBuildFile; fileRef = 8D0F1C292A2B3C4D00000001 /* AppDelegate.swift */; };
                  8D0F1C2E2A2B3C4D00000001 /* Info.plist in Resources */ = {isa = PBXBuildFile; fileRef = 8D0F1C2D2A2B3C4D00000001 /* Info.plist */; };
                  /* End PBXBuildFile section */

                  /* Begin PBXFileReference section */
                  8D0F1C282A2B3C4D00000001 /* Habitapp.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = Habitapp.app; sourceTree = BUILT_PRODUCTS_DIR; };
                  8D0F1C292A2B3C4D00000001 /* AppDelegate.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = Classes/AppDelegate.swift; sourceTree = SOURCE_ROOT; };
                  8D0F1C2D2A2B3C4D00000001 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Resources/Info.plist; sourceTree = SOURCE_ROOT; };
                  /* End PBXFileReference section */

                  /* Begin PBXFrameworksBuildPhase section */
                  8D0F1C252A2B3C4D00000001 /* Frameworks */ = {
                      isa = PBXFrameworksBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
                  /* End PBXFrameworksBuildPhase section */

                  /* Begin PBXGroup section */
                  8D0F1C202A2B3C4D00000001 = {
                      isa = PBXGroup;
                      children = (
                          8D0F1C212A2B3C4D00000001 /* Habitapp */,
                          8D0F1C272A2B3C4D00000001 /* Products */,
                      );
                      sourceTree = "<group>";
                  };
                  8D0F1C212A2B3C4D00000001 /* Habitapp */ = {
                      isa = PBXGroup;
                      children = (
                          8D0F1C222A2B3C4D00000001 /* Classes */,
                          8D0F1C262A2B3C4D00000001 /* Resources */,
                      );
                      path = Habitapp;
                      sourceTree = "<group>";
                  };
                  8D0F1C222A2B3C4D00000001 /* Classes */ = {
                      isa = PBXGroup;
                      children = (
                          8D0F1C292A2B3C4D00000001 /* AppDelegate.swift */,
