name: Build iOS IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch: # 支持手动触发

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 导入苹果签名证书
        env:
          P12_FILE: ${{ secrets.P12_FILE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # 创建证书目录
          mkdir -p ~/Library/MobileDevice/Certificates
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # 解码并保存P12证书（匹配你的工程命名）
          echo "$P12_FILE" | base64 --decode > ~/Library/MobileDevice/Certificates/YourApp.p12
          # 解码并保存描述文件（匹配你的工程命名）
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/YourApp.mobileprovision

      - name: 配置Xcode签名
        run: |
          # 查看可用的Xcode版本
          xcode-select -p
          # 适配手动创建的YourApp.xcodeproj工程
          xcodebuild -project YourApp.xcodeproj -scheme YourApp -configuration Release \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="Habitapp"

      - name: 清理并归档（核心步骤，修复archive not found）
        run: |
          # 适配手动创建的工程：清理命令
          xcodebuild clean -project YourApp.xcodeproj -scheme YourApp -configuration Release
          # 强制归档，适配手动工程+补充必要配置
          xcodebuild archive -project YourApp.xcodeproj -scheme YourApp -configuration Release \
          -archivePath ./YourApp.xcarchive \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="Habitapp" \
          DEVELOPMENT_TEAM="6GMTCJDKPM" \
          IPHONEOS_DEPLOYMENT_TARGET=15.0 \
          SWIFT_VERSION=5.9 \
          PRODUCT_BUNDLE_IDENTIFIER=com.hupanfeng.habit-tracker

      - name: 导出IPA
        run: |
          # 创建导出目录
          mkdir -p ./IPA
          # 导出IPA，适配手动工程
          xcodebuild -exportArchive -archivePath ./YourApp.xcarchive \
          -exportPath ./IPA \
          -exportOptionsPlist <(cat << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string> <!-- 测试用改为ad-hoc -->
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.hupanfeng.habit-tracker</key>
                  <string>Habitapp</string>
              </dict>
          </dict>
          </plist>
          EOF
          )

      - name: 上传IPA作为产物
        uses: actions/upload-artifact@v4
        with:
          name: YourApp-IPA
          path: ./IPA/*.ipa