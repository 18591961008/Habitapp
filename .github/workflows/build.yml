name: Build iOS IPA (Final Stable Version)
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 清理旧产物
        run: |
          rm -rf Habitapp.xcodeproj Habitapp build IPA Payload 2>/dev/null || true

      - name: 导入签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 生成标准 Xcode 工程（核心修复）
        run: |
          # 1. 创建基础目录结构（顺序不可改）
          mkdir -p Habitapp/Classes
          mkdir -p Habitapp/Resources
          mkdir -p Habitapp.xcodeproj

          # 2. 生成 Info.plist（单引号屏蔽变量解析）
          cat > Habitapp/Resources/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.yourteam.Habitapp</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
          </dict>
          </plist>
          EOF

          # 3. 生成 App 入口代码
          cat > Habitapp/Classes/App.swift << 'EOF'
          import UIKit
          @main
          class HabitappApp: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = UIViewController(rootView: UILabel(text: "Habitapp Build Success!"))
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          extension UIViewController {
              convenience init(rootView: UIView) {
                  self.init()
                  view.addSubview(rootView)
                  rootView.frame = view.bounds
              }
          }
          EOF

          # 4. 生成最简可用的 project.pbxproj（无 workspace 依赖）
          cat > Habitapp.xcodeproj/project.pbxproj << 'EOF'
          // !$*UTF8*$!
          {
              archiveVersion = 1;
              objectVersion = 55;
              objects = {
                  /* PBXBuildFile */
                  A1B2C3D4 /* App.swift in Sources */ = {isa = PBXBuildFile; fileRef = D4C3B2A1 /* App.swift */; };
                  E5F6G7H8 /* Info.plist in Resources */ = {isa = PBXBuildFile; fileRef = H8G7F6E5 /* Info.plist */; };

                  /* PBXFileReference */
                  D4C3B2A1 /* App.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = App.swift; sourceTree = "<group>"; };
                  H8G7F6E5 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
                  12345678 /* Habitapp.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; path = Habitapp.app; sourceTree = BUILT_PRODUCTS_DIR; };

                  /* PBXGroup */
                  00000000 /* Project */ = {
                      isa = PBXGroup;
                      children = (00000001 /* Habitapp */, 00000002 /* Products */);
                      sourceTree = "<group>";
                  };
                  00000001 /* Habitapp */ = {
                      isa = PBXGroup;
                      children = (00000003 /* Classes */, 00000004 /* Resources */);
                      path = Habitapp;
                      sourceTree = "<group>";
                  };
                  00000003 /* Classes */ = {isa = PBXGroup; children = (D4C3B2A1 /* App.swift */); path = Classes; sourceTree = "<group>"; };
                  00000004 /* Resources */ = {isa = PBXGroup; children = (H8G7F6E5 /* Info.plist */); path = Resources; sourceTree = "<group>"; };
                  00000002 /* Products */ = {isa = PBXGroup; children = (12345678 /* Habitapp.app */); name = Products; sourceTree = BUILT_PRODUCTS_DIR; };

                  /* PBXNativeTarget */
                  99999999 /* Habitapp */ = {
                      isa = PBXNativeTarget;
                      buildConfigurationList = CCCCCC /* ConfigList */;
                      buildPhases = (SSSSSS /* Sources */, FFFFFF /* Frameworks */, RRRRRR /* Resources */);
                      name = Habitapp;
                      productReference = 12345678 /* Habitapp.app */;
                      productType = "com.apple.product-type.application";
                  };

                  /* PBXProject */
                  PPPP /* Project */ = {
                      isa = PBXProject;
                      attributes = {TargetAttributes = {99999999 = {CreatedOnToolsVersion = 15.0; }; }; };
                      buildConfigurationList = PPPPC /* ProjectConfigList */;
                      compatibilityVersion = "Xcode 14.0";
                      mainGroup = 00000000 /* Project */;
                      productRefGroup = 00000002 /* Products */;
                      targets = (99999999 /* Habitapp */);
                  };

                  /* PBXBuildPhases */
                  SSSSSS /* Sources */ = {isa = PBXSourcesBuildPhase; files = (A1B2C3D4 /* App.swift in Sources */); };
                  FFFFFF /* Frameworks */ = {isa = PBXFrameworksBuildPhase; files = (); };
                  RRRRRR /* Resources */ = {isa = PBXResourcesBuildPhase; files = (E5F6G7H8 /* Info.plist in Resources */); };

                  /* XCBuildConfiguration */
                  DDD /* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          INFOPLIST_FILE = Habitapp/Resources/Info.plist;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          PRODUCT_BUNDLE_IDENTIFIER = com.yourteam.Habitapp;
                          PRODUCT_NAME = Habitapp;
                          SWIFT_VERSION = 5.9;
                          CODE_SIGN_IDENTITY = "iPhone Distribution";
                          CODE_SIGN_STYLE = Manual;
                      };
                      name = Debug;
                  };
                  RRR /* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          INFOPLIST_FILE = Habitapp/Resources/Info.plist;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          PRODUCT_BUNDLE_IDENTIFIER = com.yourteam.Habitapp;
                          PRODUCT_NAME = Habitapp;
                          SWIFT_VERSION = 5.9;
                          CODE_SIGN_IDENTITY = "iPhone Distribution";
                          CODE_SIGN_STYLE = Manual;
                          VALID_ARCHS = arm64;
                      };
                      name = Release;
                  };
                  CCCCCC /* ConfigList */ = {isa = XCConfigurationList; buildConfigurations = (DDD, RRR); defaultConfigurationName = Release; };
                  PPPPC /* ProjectConfigList */ = {isa = XCConfigurationList; buildConfigurations = (DDD, RRR); defaultConfigurationName = Release; };
              };
              rootObject = PPPP /* Project */;
          }
          EOF

      - name: 编译归档（无 workspace，直接用 project）
        run: |
          # 提取 Team ID（兼容证书输出格式）
          TEAM_ID=$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -n1 | awk '{print $2}' | cut -d= -f2 | cut -d'"' -f1)
          if [ -z "$TEAM_ID" ]; then echo "❌ 未找到签名证书"; exit 1; fi

          # 执行归档（核心：用 -project 而非 -workspace）
          xcodebuild archive \
            -project Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination generic/platform=iOS \
            -archivePath ./build/Habitapp.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            PROVISIONING_PROFILE_SPECIFIER=Habitapp \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution"

      - name: 导出 IPA
        run: |
          # 生成极简 ExportOptions
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -n1 | awk '{print $2}' | cut -d= -f2 | cut -d'"' -f1)</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yourteam.Habitapp</key>
                  <string>Habitapp</string>
              </dict>
          </dict>
          </plist>
          EOF

          # 导出 IPA
          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa