name: Build iOS IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch: # 支持手动触发

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 配置Swift编译环境（适配新版Swift）
        run: |
          # 确保源码在 Sources 目录（Swift Package 标准结构）
          if [ ! -d "Sources" ]; then
            mkdir -p Sources/Habitapp
            # 将根目录的Swift文件移动到标准目录
            find . -name "*.swift" -not -path "./Tests/*" -exec mv {} Sources/Habitapp/ \;
          fi
          # 初始化标准Swift Package配置
          cat > Package.swift << EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Habitapp",
              platforms: [.iOS(.v15)],
              products: [
                  .library(
                      name: "Habitapp",
                      targets: ["Habitapp"]),
              ],
              targets: [
                  .target(
                      name: "Habitapp",
                      path: "Sources/Habitapp"),
              ]
          )
          EOF

      - name: 导入苹果签名证书
        env:
          P12_FILE: ${{ secrets.P12_FILE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # 创建证书和描述文件目录
          mkdir -p ~/Library/MobileDevice/Certificates
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # 解码并保存证书/描述文件
          echo "$P12_FILE" | base64 --decode > ~/Library/MobileDevice/Certificates/Habitapp.p12
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

          # 导入证书到钥匙串（解决签名权限问题）
          security import ~/Library/MobileDevice/Certificates/Habitapp.p12 -k ~/Library/Keychains/login.keychain-db -P "$P12_PASSWORD" -T /usr/bin/codesign

      - name: 编译Swift源码（修复--platform失效问题）
        run: |
          # 自动获取iPhone SDK的绝对路径
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          # 自动获取Xcode工具链的bin目录
          TOOLCHAIN_BIN_DIR=$(xcrun --find clang | xargs dirname)
          # 创建iOS编译目标描述文件（补充缺失的toolchain-bin-dir）
          cat > ios-arm64.json << EOF
          {
            "version": 1,
            "sdk": "$SDK_PATH",
            "toolchain": "com.apple.dt.toolchain.XcodeDefault",
            "toolchain-bin-dir": "$TOOLCHAIN_BIN_DIR",
            "target": "arm64-apple-ios15.0",
            "arch": "arm64"
          }
          EOF
          # 使用--destination指定iOS编译目标
          swift build -c release --destination ios-arm64.json

      - name: 手动构建App包并签名（绕开xcodeproj）
        run: |
          # 创建App包目录结构
          mkdir -p ./Habitapp.app/Contents/MacOS
          mkdir -p ./Habitapp.app/Contents/Resources
          
          # 复制编译产物到App包
          cp .build/arm64-apple-ios/release/libHabitapp.dylib ./Habitapp.app/Contents/MacOS/Habitapp
          
          # 创建Info.plist（App必需配置）
          cat > ./Habitapp.app/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.hupanfeng.habit-tracker</string>
              <key>CFBundleName</key>
              <string>Habitapp</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
          </dict>
          </plist>
          EOF

          # 提取描述文件中的权限并签名App包
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision > provision.plist
          /usr/libexec/PlistBuddy -x -c 'Print:Entitlements' provision.plist > entitlements.plist
          codesign --force --sign "iPhone Distribution" --entitlements entitlements.plist ./Habitapp.app

      - name: 打包为IPA文件
        run: |
          # 创建IPA打包目录
          mkdir -p ./IPA ./Payload
          mv ./Habitapp.app ./Payload/
          
          # 压缩为IPA
          zip -r ./IPA/Habitapp.ipa ./Payload
          
          # 清理临时文件
          rm -rf ./Payload ios-arm64.json provision.plist entitlements.plist

      - name: 上传IPA作为产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa