name: Build iOS IPA (终极稳定版 - 不折腾工程)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 清理环境
        run: rm -rf ./build ./IPA ./Payload 2>/dev/null || true

      - name: 导入证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision
          # 提取UUID
          TEMP_PROFILE=$(mktemp).mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$TEMP_PROFILE"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i "$TEMP_PROFILE"))
          mv "$TEMP_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "UUID: $PROFILE_UUID"

      - name: 创建标准iOS项目结构
        run: |
          # 创建目录结构
          mkdir -p Habitapp/Resources
          mkdir -p Payload

          # 1. 生成 Pod 风格的基础 Swift 文件 (App入口)
          cat > Habitapp/main.swift << EOF
          import UIKit
          import SwiftUI

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  let contentView = ContentView()
                  let hostingController = UIHostingController(rootView: contentView)
                  
                  self.window = UIWindow(frame: UIScreen.main.bounds)
                  self.window?.rootViewController = hostingController
                  self.window?.makeKeyAndVisible()
                  
                  return true
              }
          }

          struct ContentView: View {
              var body: some View {
                  Text("Habitapp - 打包成功")
                    .font(.largeTitle)
                    .foregroundColor(.black)
              }
          }
          EOF

          # 2. 生成 Info.plist (关键：指定Bundle ID和团队)
          cat > Habitapp/Resources/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>$(DEVELOPMENT_LANGUAGE)</string>
              <key>CFBundleDisplayName</key>
              <string>Habitapp</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.hupanfeng.habit-tracker</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
              <key>UIMainStoryboardFile</key>
              <string></string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: 编译归档 (xcodebuild 官方命令)
        run: |
          xcodebuild archive \
            -project ./Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            -configuration Release \
            PRODUCT_BUNDLE_IDENTIFIER=com.hupanfeng.habit-tracker \
            DEVELOPMENT_TEAM=6GMTCJDKPM \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="*" \
            -allowProvisioningUpdates \
            -verbose

      - name: 导出IPA
        if: success()
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA \
            -verbose

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA-Final
          path: ./IPA/*.ipa