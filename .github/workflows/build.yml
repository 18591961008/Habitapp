name: Build iOS IPA (嵌入 mobileprovision 最终版)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 清理环境
        run: rm -rf ./build ./IPA ./Payload 2>/dev/null || true

      - name: 导入证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 【关键】提取并嵌入 mobileprovision
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # 先把描述文件解码到临时文件
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > temp.mobileprovision
          # 强制创建 .app 目录
          mkdir -p Payload/Habitapp.app
          # 嵌入到 .app 目录，命名为 embedded.mobileprovision（Diawi 要求的名字）
          cp temp.mobileprovision Payload/Habitapp.app/embedded.mobileprovision
          rm temp.mobileprovision

      - name: 生成 Info.plist + 可执行文件
        run: |
          # 1. 生成 Info.plist
          cat > Payload/Habitapp.app/Info.plist << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleExecutable</key>
  <string>Habitapp</string>
  <key>CFBundleIdentifier</key>
  <string>com.hupanfeng.habit-tracker</string>
  <key>CFBundleVersion</key>
  <string>1.0</string>
  <key>CFBundleShortVersionString</key>
  <string>1.0</string>
  <key>CFBundlePackageType</key>
  <string>APPL</string>
  <key>LSRequiresIPhoneOS</key>
  <true/>
  <key>MinimumOSVersion</key>
  <string>15.0</string>
  <key>CFBundleName</key>
  <string>Habitapp</string>
  <key>CFBundleDisplayName</key>
  <string>Habitapp</string>
</dict>
</plist>
EOF

          # 2. 生成空可执行文件
          echo "#!/bin/sh" > Payload/Habitapp.app/Habitapp
          echo "exit 0" >> Payload/Habitapp.app/Habitapp
          chmod +x Payload/Habitapp.app/Habitapp

      - name: 签名并打包
        run: |
          # 签名（可选，格式校验不强制）
          codesign --force --deep --sign "iPhone Distribution" Payload/Habitapp.app 2>/dev/null || true
          # 打包为 IPA
          zip -r Habitapp.ipa Payload
          mkdir -p IPA
          mv Habitapp.ipa IPA/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA-Diawi-Final
          path: ./IPA/*.ipa