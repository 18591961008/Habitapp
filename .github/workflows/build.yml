name: Build iOS IPA (真机可安装版 - 复用你之前的成功流程)
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 清理旧文件
        run: |
          rm -rf ./build ./IPA ./Payload ./DerivedData *.xcodeproj *.xcworkspace 2>/dev/null || true

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # 提取描述文件UUID并按标准命名
          TEMP_PROFILE=$(mktemp).mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$TEMP_PROFILE"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i "$TEMP_PROFILE"))
          mv "$TEMP_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "✅ 描述文件UUID: $PROFILE_UUID"

      - name: 配置Swift Package并生成App入口
        run: |
          if [ ! -f "Package.swift" ]; then
            swift package init --type library --name Habitapp 2>/dev/null || true
          fi

          cat > Package.swift << EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Habitapp",
              platforms: [.iOS(.v15)],
              products: [
                  .executable(name: "Habitapp", targets: ["Habitapp"])
              ],
              dependencies: [],
              targets: [
                  .executableTarget(
                      name: "Habitapp",
                      path: "Sources/Habitapp"
                  )
              ]
          )
          EOF

          mkdir -p Sources/Habitapp
          cat > Sources/Habitapp/App.swift << EOF
          import SwiftUI

          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      Text("极简习惯追踪 - 真机测试版")
                          .font(.title)
                          .foregroundColor(.black)
                  }
              }
          }
          EOF

          find . -name "*.swift" -not -path "./Sources/*" -exec cp {} Sources/Habitapp/ \; 2>/dev/null || true

      - name: 编译为真机版本（核心修复：不再编译模拟器）
        run: |
          # 编译为真机 arm64 架构
          swift build --product Habitapp --triple arm64-apple-ios -c release

          # 找到编译产物并创建 .app 结构
          APP_DIR=".build/arm64-apple-ios/release/Habitapp.app"
          mkdir -p "$APP_DIR"
          cp .build/arm64-apple-ios/release/Habitapp "$APP_DIR/Habitapp"

          # 创建 Info.plist（解决之前的 Bundle ID 问题）
          cat > "$APP_DIR/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Habitapp</string>
              <key>CFBundleIdentifier</key>
              <string>com.hupanfeng.habit-tracker</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
          </dict>
          </plist>
          EOF

      - name: 重新签名（适配真机）
        run: |
          # 找到描述文件UUID
          TEMP_PROFILE=$(mktemp).mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$TEMP_PROFILE"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i "$TEMP_PROFILE"))
          rm -f "$TEMP_PROFILE"

          # 重新签名（根据你的证书类型选择）
          # 如果你用 Development 证书：
          # codesign --force --deep --sign "iPhone Developer" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision .build/arm64-apple-ios/release/Habitapp.app

          # 如果你用 Distribution 证书（Ad Hoc）：
          codesign --force --deep --sign "iPhone Distribution" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision .build/arm64-apple-ios/release/Habitapp.app

      - name: 打包为IPA
        run: |
          mkdir -p Payload
          cp -r .build/arm64-apple-ios/release/Habitapp.app Payload/
          zip -r Habitapp.ipa Payload
          mkdir -p IPA
          mv Habitapp.ipa IPA/

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-真机IPA
          path: ./IPA/*.ipa