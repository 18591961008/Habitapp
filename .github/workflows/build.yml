                      path = Classes;
                      sourceTree = "<group>";
                  };
                  8D0F1C262A2B3C4D00000001 /* Resources */ = {
                      isa = PBXGroup;
                      children = (
                          8D0F1C2D2A2B3C4D00000001 /* Info.plist */,
                      );
                      path = Resources;
                      sourceTree = "<group>";
                  };
                  8D0F1C272A2B3C4D00000001 /* Products */ = {
                      isa = PBXGroup;
                      children = (
                          8D0F1C282A2B3C4D00000001 /* Habitapp.app */,
                      );
                      name = Products;
                      sourceTree = BUILT_PRODUCTS_DIR;
                  };
                  /* End PBXGroup section */

                  /* Begin PBXNativeTarget section */
                  8D0F1C242A2B3C4D00000001 /* Habitapp */ = {
                      isa = PBXNativeTarget;
                      buildConfigurationList = 8D0F1C322A2B3C4D00000001 /* Build configuration list for PBXNativeTarget "Habitapp" */;
                      buildPhases = (
                          8D0F1C232A2B3C4D00000001 /* Sources */,
                          8D0F1C252A2B3C4D00000001 /* Frameworks */,
                          8D0F1C2F2A2B3C4D00000001 /* Resources */,
                      );
                      buildRules = (
                      );
                      dependencies = (
                      );
                      name = Habitapp;
                      productName = Habitapp;
                      productReference = 8D0F1C282A2B3C4D00000001 /* Habitapp.app */;
                      productType = "com.apple.product-type.application";
                  };
                  /* End PBXNativeTarget section */

                  /* Begin PBXProject section */
                  8D0F1C202A2B3C4D00000001 /* Project object */ = {
                      isa = PBXProject;
                      attributes = {
                          LastUpgradeCheck = 1500;
                          ORGANIZATIONNAME = "YourOrg";
                          TargetAttributes = {
                              8D0F1C242A2B3C4D00000001 = {
                                  CreatedOnToolsVersion = 15.0;
                              };
                          };
                      };
                      buildConfigurationList = 8D0F1C302A2B3C4D00000001 /* Build configuration list for PBXProject "Habitapp" */;
                      compatibilityVersion = "Xcode 14.0";
                      developmentRegion = en;
                      hasScannedForEncodings = 0;
                      knownRegions = (
                          en,
                          Base,
                      );
                      mainGroup = 8D0F1C202A2B3C4D00000001;
                      productRefGroup = 8D0F1C272A2B3C4D00000001 /* Products */;
                      projectDirPath = "";
                      projectRoot = "";
                      targets = (
                          8D0F1C242A2B3C4D00000001 /* Habitapp */,
                      );
                  };
                  /* End PBXProject section */

                  /* Begin PBXResourcesBuildPhase section */
                  8D0F1C2F2A2B3C4D00000001 /* Resources */ = {
                      isa = PBXResourcesBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                          8D0F1C2E2A2B3C4D00000001 /* Info.plist in Resources */,
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
                  /* End PBXResourcesBuildPhase section */

                  /* Begin PBXSourcesBuildPhase section */
                  8D0F1C232A2B3C4D00000001 /* Sources */ = {
                      isa = PBXSourcesBuildPhase;
                      buildActionMask = 2147483647;
                      files = (
                          8D0F1C2A2A2B3C4D00000001 /* AppDelegate.swift in Sources */,
                      );
                      runOnlyForDeploymentPostprocessing = 0;
                  };
                  /* End PBXSourcesBuildPhase section */

                  /* Begin XCBuildConfiguration section */
                  8D0F1C332A2B3C4D00000001 /* Debug */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          CLANG_ANALYZER_NONNULL = YES;
                          CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION = YES;
                          CLANG_CXX_LANGUAGE_STANDARD = "gnu++17";
                          CLANG_ENABLE_MODULES = YES;
                          CLANG_ENABLE_OBJC_ARC = YES;
                          CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING = YES;
                          CLANG_WARN_BOOL_CONVERSION = YES;
                          CLANG_WARN_COMMA = YES;
                          CLANG_WARN_CONSTANT_CONVERSION = YES;
                          CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS = YES;
                          CLANG_WARN_EMPTY_BODY = YES;
                          CLANG_WARN_ENUM_CONVERSION = YES;
                          CLANG_WARN_INFINITE_RECURSION = YES;
                          CLANG_WARN_INT_CONVERSION = YES;
                          CLANG_WARN_NON_LITERAL_NULL_CONVERSION = YES;
                          CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF = YES;
                          CLANG_WARN_OBJC_LITERAL_CONVERSION = YES;
                          CLANG_WARN_RANGE_CHECK = YES;
                          CLANG_WARN_STRICT_PROTOTYPES = YES;
                          CLANG_WARN_SUSPICIOUS_MOVE = YES;
                          CLANG_WARN_UNREACHABLE_CODE = YES;
                          CODE_SIGN_IDENTITY = "iPhone Distribution";
                          CODE_SIGN_STYLE = Manual;
                          DEBUG_INFORMATION_FORMAT = dwarf;
                          ENABLE_STRICT_OBJC_MSGSEND = YES;
                          GCC_C_LANGUAGE_STANDARD = gnu11;
                          GCC_NO_COMMON_BLOCKS = YES;
                          GCC_WARN_64_TO_32_BIT_CONVERSION = YES;
                          GCC_WARN_ABOUT_RETURN_TYPE = YES;
                          GCC_WARN_UNDECLARED_SELECTOR = YES;
                          GCC_WARN_UNINITIALIZED_AUTOS = YES;
                          GCC_WARN_UNUSED_FUNCTION = YES;
                          GCC_WARN_UNUSED_VARIABLE = YES;
                          INFOPLIST_FILE = Habitapp/Resources/Info.plist;
                          IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                          LD_RUNPATH_SEARCH_PATHS = (
                              "$(inherited)",
                              "@executable_path/Frameworks",
                          );
                          PRODUCT_BUNDLE_IDENTIFIER = "com.yourcompany.Habitapp";
                          PRODUCT_NAME = "$(TARGET_NAME)";
                          SWIFT_VERSION = 5.0;
                          TARGETED_DEVICE_FAMILY = "1,2";
                      };
                      name = Debug;
                  };
                  8D0F1C342A2B3C4D00000001 /* Release */ = {
                      isa = XCBuildConfiguration;
                      buildSettings = {
                          ALWAYS_SEARCH_USER_PATHS = NO;
                          CLANG_ANALYZER_NONNULL = YES;
                          CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION = YES;
                          CLANG_CXX_LANGUAGE_STANDARD = "gnu++17";
                          CLANG_ENABLE_MODULES = YES;
                          CLANG_ENABLE_OBJC_ARC = YES;
                          CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING = YES;
                          CLANG_WARN_BOOL_CONVERSION = YES;
                          CLANG_WARN_COMMA = YES;
                          CLANG_WARN_CONSTANT_CONVERSION = YES;
                          CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS = YES;
                          CLANG_WARN_EMPTY_BODY = YES;
                          CLANG_WARN_ENUM_CONVERSION = YES;
                          CLANG_WARN_INFINITE_RECURSION = YES;
                          CLANG_WARN_INT_CONVERSION = YES;
                          CLANG_WARN_NON_LITERAL_NULL_CONVERSION = YES;
                          CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF = YES;
                          CLANG_WARN_OBJC_LITERAL_CONVERSION = YES;
                          CLANG_WARN_RANGE_CHECK = YES;
                          CLANG_WARN_STRICT_PROTOTYPES = YES;
                          CLANG_WARN_SUSPICIOUS_MOVE = YES;
                          CLANG_WARN_UNREACHABLE_CODE = YES;
