name: Build iOS IPA (绝境重生 - 原生工程一键版)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 清理环境
        run: rm -rf ./build ./IPA ./Payload ./Habitapp.xcodeproj 2>/dev/null || true

      - name: 导入证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          TEMP_PROFILE=$(mktemp).mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > "$TEMP_PROFILE"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i "$TEMP_PROFILE"))
          mv "$TEMP_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "UUID: $PROFILE_UUID"

      - name: 【核心】创建原生Xcode工程并注入代码
        run: |
          # 1. 创建标准的 iOS 单页面应用模板 (这一步绝对能生成工程，不再报错)
          xcodebuild -create-project \
            -project ./Habitapp.xcodeproj \
            -scheme Habitapp \
            -target Habitapp \
            -platform iOS \
            -language Swift \
            -dir .

          # 2. 把你的 Swift 代码复制到工程目录 (覆盖默认的 ViewController)
          find . -name "*.swift" -not -path "./Habitapp/*" -exec cp {} ./Habitapp/ \; 2>/dev/null || true

          # 3. 手动修复工程配置，强制指定参数，防止Xcode找错
          echo "修复工程配置..."
          defaults write com.apple.dt.Xcode IDEApplicationLanguage -string "Swift"
          defaults write com.apple.dt.Xcode IDEBuildSystemVersion -string "1"

      - name: 编译归档 (直接针对 .xcodeproj 工程，绝对稳定)
        run: |
          xcodebuild archive \
            -project ./Habitapp.xcodeproj \
            -scheme Habitapp \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Habitapp.xcarchive \
            -configuration Release \
            PRODUCT_BUNDLE_IDENTIFIER=com.hupanfeng.habit-tracker \
            DEVELOPMENT_TEAM=6GMTCJDKPM \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="*" \
            -allowProvisioningUpdates \
            -verbose

      - name: 导出IPA
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ./build/Habitapp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./IPA \
            -verbose

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-成功IPA
          path: ./IPA/*.ipa