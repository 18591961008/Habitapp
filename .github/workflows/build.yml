name: Build iOS IPA (Swift Package 版)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      - name: 导入苹果签名证书
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_FILE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 配置Swift Package并生成App入口
        run: |
          # 1. 初始化Swift Package（如果不存在）
          if [ ! -f "Package.swift" ]; then
            swift package init --type library --name Habitapp
          fi

          # 2. 重写Package.swift，声明为iOS App
          cat > Package.swift << EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Habitapp",
              platforms: [.iOS(.v15)],
              products: [
                  .executable(name: "Habitapp", targets: ["Habitapp"])
              ],
              dependencies: [
                  .package(url: "https://github.com/apple/swiftui.git", from: "4.0.0")
              ],
              targets: [
                  .executableTarget(
                      name: "Habitapp",
                      dependencies: [.product(name: "SwiftUI", package: "swiftui")],
                      path: "Sources/Habitapp"
                  )
              ]
          )
          EOF

          # 3. 生成SwiftUI App入口文件（解决@main缺失问题）
          mkdir -p Sources/Habitapp
          cat > Sources/Habitapp/App.swift << EOF
          import SwiftUI

          @main
          struct HabitappApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

      - name: 编译并生成App
        run: |
          # 使用xcodebuild直接编译Swift Package
          xcodebuild build -scheme Habitapp -destination 'platform=iOS Simulator,name=iPhone 15' -configuration Release

          # 找到编译产物并复制到Payload目录
          BUILD_DIR=$(xcodebuild -showBuildSettings -scheme Habitapp | grep "BUILD_DIR" | cut -d= -f2 | xargs)
          APP_PATH="$BUILD_DIR/Release-iphonesimulator/Habitapp.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # 重新签名（适配真机）
          codesign --force --deep --sign "iPhone Distribution" --entitlements ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision Payload/Habitapp.app

      - name: 打包为IPA
        run: |
          zip -r Habitapp.ipa Payload
          mkdir -p IPA
          mv Habitapp.ipa IPA/

      - name: 上传IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa