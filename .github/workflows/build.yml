name: Build iOS IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch: # 支持手动触发

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取Git代码
        uses: actions/checkout@v4

      # 新增：自动生成完整的Xcode工程（解决手动工程损坏问题）
      - name: 自动生成完整Habitapp.xcodeproj工程
        run: |
          # 初始化Swift Package（确保工程可被Xcode识别）
          if [ ! -f "Package.swift" ]; then
            swift package init --type library --name Habitapp
          fi
          # 生成合法的Habitapp.xcodeproj工程文件（覆盖损坏的手动工程）
          swift package generate-xcodeproj --name Habitapp
          # 验证工程文件是否生成成功
          ls -la Habitapp.xcodeproj
          # 修复Scheme名称（自动生成的Scheme为Habitapp-Package，同步到后续命令）
          sed -i '' 's/-scheme Habitapp/-scheme Habitapp-Package/g' $GITHUB_WORKSPACE/.github/workflows/build.yml || true

      - name: 导入苹果签名证书
        env:
          P12_FILE: ${{ secrets.P12_FILE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # 创建证书目录
          mkdir -p ~/Library/MobileDevice/Certificates
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # 解码并保存P12证书（匹配你的工程命名）
          echo "$P12_FILE" | base64 --decode > ~/Library/MobileDevice/Certificates/Habitapp.p12
          # 解码并保存描述文件（匹配你的工程命名）
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Habitapp.mobileprovision

      - name: 配置Xcode签名
        run: |
          # 查看可用的Xcode版本
          xcode-select -p
          # 使用自动生成的工程Scheme：Habitapp-Package
          xcodebuild -project Habitapp.xcodeproj -scheme Habitapp-Package -configuration Release \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="Habitapp"

      - name: 清理并归档（核心步骤，修复archive not found）
        run: |
          # 适配自动生成的工程：清理命令
          xcodebuild clean -project Habitapp.xcodeproj -scheme Habitapp-Package -configuration Release
          # 强制归档，适配自动生成工程+补充必要配置
          xcodebuild archive -project Habitapp.xcodeproj -scheme Habitapp-Package -configuration Release \
          -archivePath ./Habitapp.xcarchive \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="Habitapp" \
          DEVELOPMENT_TEAM="6GMTCJDKPM" \
          IPHONEOS_DEPLOYMENT_TARGET=15.0 \
          SWIFT_VERSION=5.9 \
          PRODUCT_BUNDLE_IDENTIFIER=com.hupanfeng.habit-tracker

      - name: 导出IPA
        run: |
          # 创建导出目录
          mkdir -p ./IPA
          # 导出IPA，适配自动生成工程
          xcodebuild -exportArchive -archivePath ./Habitapp.xcarchive \
          -exportPath ./IPA \
          -exportOptionsPlist <(cat << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string> <!-- 测试用改为ad-hoc -->
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>6GMTCJDKPM</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.hupanfeng.habit-tracker</key>
                  <string>Habitapp</string>
              </dict>
          </dict>
          </plist>
          EOF
          )

      - name: 上传IPA作为产物
        uses: actions/upload-artifact@v4
        with:
          name: Habitapp-IPA
          path: ./IPA/*.ipa